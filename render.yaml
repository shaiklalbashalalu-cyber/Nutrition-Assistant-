services:
  - type: web
    name: nutrition-assistant-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false # User must provide their Atlas connection string in Render Dashboard
      - key: JWT_SECRET
        generateValue: true # Render will generate a cryptographically secure key automatically
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
